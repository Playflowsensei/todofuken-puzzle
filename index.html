<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>日本一周！都道府県せいはの旅｜4年社会</title>
<meta name="theme-color" content="#2f6df0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="都道府県パズル">
<style>
  :root{--bg:#eef3fb;--ink:#21304a;--line:#d4ddec;--accent:#2f6df0;--accent2:#10b981;--warn:#ef4444;--gold:#f4b400;--panel:#fff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;overflow:hidden;}
  header{background:linear-gradient(135deg,#e7f0ff,#e9fff5);border-bottom:1px solid var(--line);padding:6px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  header h1{font-size:15px;margin:0;}
  header .grow{flex:1;}
  .tabs{display:flex;gap:6px;}
  .tab{border:none;background:#e2e9f5;color:#56678a;font-weight:700;font-size:13px;padding:7px 12px;border-radius:10px;cursor:pointer;font-family:inherit;}
  .tab.on{background:var(--accent);color:#fff;}
  .ctrl{display:flex;align-items:center;gap:8px;font-size:13px;}
  .pill{font-size:12px;font-weight:700;color:#41506b;background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:4px 10px;}
  .btn{font-family:inherit;font-size:13px;border-radius:9px;border:none;padding:6px 11px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;}
  .btn.sub{background:#eaeef5;color:#41506b;}
  .btn.sm{padding:5px 9px;font-size:12px;}

  #app{display:flex;height:calc(100% - 46px);}
  #stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:8px;}
  #boardWrap{position:relative;width:100%;height:100%;}
  svg#board{width:100%;height:100%;touch-action:none;}
  #board .prefecture{fill:#e7edf7;stroke:#b7c3d8;stroke-width:1;transition:fill .2s,stroke .2s,stroke-width .2s,filter .2s;}
  #board .prefecture.done{stroke:#74839d;animation:prefDonePop .42s cubic-bezier(.18,.8,.24,1.18);}
  #board .prefecture.hot{fill:#cfe0ff !important;}
  #board .prefecture.magnet{fill:#d9fbe9 !important;stroke:#10b981;stroke-width:2.6;filter:drop-shadow(0 0 8px rgba(16,185,129,.55));animation:magnetPulse .55s ease-in-out infinite alternate;}
  #board .prefecture.hint{fill:#fff3cf !important;animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
  @keyframes magnetPulse{0%{filter:drop-shadow(0 0 4px rgba(16,185,129,.35));}100%{filter:drop-shadow(0 0 12px rgba(16,185,129,.75));}}
  @keyframes prefDonePop{0%{filter:brightness(1);stroke-width:1;}45%{filter:brightness(1.22);stroke-width:3;}100%{filter:brightness(1);stroke-width:1.4;}}
  #board .pref-label{font-weight:800;fill:#1c2840;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.6px;stroke-linejoin:round;}
  #board.regionfocus .prefecture{opacity:.16;}
  #board.regionfocus .prefecture.active{opacity:1;}

  #side{width:248px;min-width:248px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;}
  #hud{padding:9px 12px;border-bottom:1px solid var(--line);}
  .hudrow{display:flex;justify-content:space-between;font-size:13px;margin:2px 0;}
  .hudrow b{font-size:15px;}
  .bar{height:9px;background:#e6ecf6;border-radius:6px;overflow:hidden;margin-top:6px;}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
  #teams{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .teamchip{flex:1;min-width:58px;text-align:center;border-radius:9px;padding:5px;font-size:12px;font-weight:700;border:2px solid;}
  .teamchip.turn{box-shadow:0 0 0 3px #fff,0 0 0 5px currentColor;}
  /* ずかん（お宝・常時表示） */
  #zukan{border-bottom:1px solid var(--line);padding:7px 10px 8px;}
  #zukan .zt{font-size:12px;font-weight:800;color:#6b7891;display:flex;justify-content:space-between;}
  #zgrid{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;max-height:148px;overflow-y:auto;}
  .zchip{width:34px;height:34px;border-radius:9px;border:2px solid #e2e8f3;background:#f7f9fd;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;position:relative;}
  .zchip.got{background:#fffaf0;border-color:#f4d488;}
  .zchip .st{position:absolute;bottom:-3px;right:-2px;font-size:8px;background:#fff;border-radius:6px;padding:0 2px;line-height:1.4;box-shadow:0 0 0 1px #f4d488;}
  #trayTitle{padding:7px 12px 2px;font-size:12px;color:#6b7891;font-weight:700;}
  #tray{flex:1;overflow-y:auto;padding:6px 10px 12px;display:flex;flex-direction:column;gap:8px;}
  .piece{position:relative;background:#fff;border:2px solid var(--line);border-radius:12px;padding:4px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;box-shadow:0 1px 3px rgba(20,40,80,.08);}
  .piece:active{cursor:grabbing;}
  .piece svg{width:84px;height:66px;display:block;overflow:visible;}
  .piece .pp{fill:#cdeed5;stroke:#2f9d68;stroke-width:1.6;}
  .piece.hardpiece .pp{fill:#dbe6f5;stroke:#7d97c4;}
  .piece .plabel{font-weight:800;fill:#0f3a25;text-anchor:middle;dominant-baseline:middle;paint-order:stroke;stroke:#fff;stroke-width:3.6px;stroke-linejoin:round;}
  .piece .pfuri{font-weight:700;fill:#2c7a52;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.4px;stroke-linejoin:round;}
  .piece.dragging{opacity:.35;}
  .ghost{position:fixed;z-index:60;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 8px 20px rgba(20,40,80,.25);}
  .ghost.magnetized{transition:left .12s ease-out,top .12s ease-out,transform .12s ease-out;transform:translate(-50%,-50%) scale(.95);box-shadow:0 8px 24px rgba(16,185,129,.42),0 0 0 5px rgba(16,185,129,.16);}

  .overlay{position:absolute;inset:0;background:rgba(238,243,251,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;z-index:80;padding:16px;overflow-y:auto;}
  .overlay.hide{display:none;}
  .card{background:#fff;border-radius:18px;padding:16px 22px;box-shadow:0 8px 30px rgba(20,40,80,.14);max-width:480px;width:100%;}
  .card h2{margin:4px 0;font-size:22px;}
  .medal{font-size:44px;}
  .pickrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .pick{border:2px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;}
  .pick.on{border-color:var(--accent);background:#eef4ff;}
  .diffrow .pick.on[data-d=easy]{border-color:#10b981;background:#eafaf2;}
  .diffrow .pick.on[data-d=normal]{border-color:#f4b400;background:#fff8e6;}
  .diffrow .pick.on[data-d=hard]{border-color:#ef4444;background:#fdeeee;}
  .regiongrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
  .toast{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#1f2a3d;color:#fff;padding:8px 16px;border-radius:20px;font-weight:700;font-size:14px;opacity:0;transition:.18s;z-index:90;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .treasure{position:absolute;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px) scale(.96);background:#fff;border:2px solid var(--gold);border-radius:16px;padding:9px 16px;box-shadow:0 8px 24px rgba(20,40,80,.18);opacity:0;transition:.25s;z-index:88;max-width:84%;text-align:center;}
  .treasure.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);animation:treasurePop .48s cubic-bezier(.18,.8,.24,1.22);}
  .treasure .titem{font-size:34px;line-height:1;}
  .treasure .tname{font-weight:900;font-size:16px;}
  .treasure .cname{font-weight:900;font-size:18px;color:#2f6df0;margin-top:2px;}
  .treasure .ctag{font-size:12.5px;color:#7a4d00;background:#fff4cf;border-radius:999px;padding:2px 9px;display:inline-block;margin-top:4px;}
  .treasure .ttrivia{font-size:12.5px;color:#5b6b85;margin-top:5px;}
  .combo{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-weight:900;font-size:34px;color:var(--gold);text-shadow:0 2px 0 #fff,0 0 14px rgba(244,180,0,.6);opacity:0;pointer-events:none;z-index:92;}
  .combo.pop{animation:comboPop .9s ease-out;}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}25%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}70%{opacity:1;transform:translate(-50%,-62%) scale(1);}100%{opacity:0;transform:translate(-50%,-82%) scale(1);}}
  .confetti{position:absolute;width:9px;height:13px;z-index:91;pointer-events:none;border-radius:2px;}
  .snap-ring{position:absolute;z-index:90;width:22px;height:22px;border:3px solid #10b981;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%) scale(.35);opacity:.9;box-shadow:0 0 0 6px rgba(16,185,129,.16);}
  .snap-ring.go{animation:snapRing .48s ease-out forwards;}
  @keyframes snapRing{0%{opacity:.9;transform:translate(-50%,-50%) scale(.35);}75%{opacity:.8;}100%{opacity:0;transform:translate(-50%,-50%) scale(2.7);}}
  .stamp{position:absolute;z-index:93;font-size:34px;pointer-events:none;transform:translate(-50%,-50%) scale(.3);opacity:0;}
  .stamp.go{animation:stampPop .7s ease-out;}
  @keyframes stampPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-18deg);}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(-8deg);}100%{opacity:0;transform:translate(-50%,-90%) scale(1) rotate(0);}}
  @keyframes treasurePop{0%{transform:translateX(-50%) translateY(18px) scale(.9);}58%{transform:translateX(-50%) translateY(-4px) scale(1.06);}100%{transform:translateX(-50%) translateY(0) scale(1);}}
  footer{position:absolute;bottom:4px;left:8px;font-size:10px;color:#9aa6bd;}
  @media (max-width:720px){#side{width:184px;min-width:184px;}.piece svg{width:64px;height:54px;}.zchip{width:30px;height:30px;font-size:15px;}}
</style>
</head>

  const cl=p.g.cloneNode(true);cl.removeAttribute('transform');cl.removeAttribute('class');cl.removeAttribute('fill');
  cl.querySelectorAll('title').forEach(t=>t.remove());
  cl.querySelectorAll('path,polygon,line').forEach(el=>{el.setAttribute('class','pp');el.removeAttribute('fill');el.removeAttribute('stroke');el.removeAttribute('stroke-width');});
  svg.appendChild(cl);
  const fs=Math.max(13,Math.min(p.bb.width,p.bb.height)*0.46),cx=p.bb.x+p.bb.width/2,cyc=p.bb.y+p.bb.height/2;
  if(d.name){const t=document.createElementNS(svgNS,'text');t.setAttribute('class','plabel');t.setAttribute('x',cx);t.setAttribute('y',d.furi?cyc-fs*0.16:cyc);t.setAttribute('font-size',fs);t.textContent=p.kanji.replace(/[都道府県]$/,'');svg.appendChild(t);}
  if(d.furi){const f=document.createElementNS(svgNS,'text');f.setAttribute('class','pfuri');f.setAttribute('x',cx);f.setAttribute('y',cyc+fs*0.62);f.setAttribute('font-size',fs*0.5);f.textContent=p.furi;svg.appendChild(f);}
  return svg;
}
function buildTray(){tray.innerHTML='';state.queue.forEach(p=>{const el=document.createElement('div');el.className='piece'+(state.difficulty==='hard'?' hardpiece':'');el.dataset.romaji=p.romaji;el.appendChild(makePieceSVG(p));tray.appendChild(el);attachDrag(el,p);});}

/* ===== ドラッグ＆ドロップ ===== */
let ghost=null,dragP=null,dragEl=null,hotEl=null,magnetEl=null;
function attachDrag(el,p){
  el.addEventListener('pointerdown',e=>{if(!state.running)return;e.preventDefault();dragP=p;dragEl=el;el.classList.add('dragging');ghost=el.cloneNode(true);ghost.classList.add('ghost');ghost.classList.remove('dragging');ghost.style.width=el.offsetWidth+'px';document.body.appendChild(ghost);moveGhost(e.clientX,e.clientY);if(DIFF[state.difficulty].hint){p.g.classList.add('hint');}el.setPointerCapture(e.pointerId);});
  el.addEventListener('pointermove',e=>{if(dragP===p){e.preventDefault();magneticMove(e.clientX,e.clientY);hotTarget(e.clientX,e.clientY);}});
  el.addEventListener('pointerup',e=>{if(dragP===p)drop(e.clientX,e.clientY);});
  el.addEventListener('pointercancel',()=>{if(dragP===p)cleanupDrag();});
}
function moveGhost(x,y){if(ghost){ghost.style.left=x+'px';ghost.style.top=y+'px';}}
function nearestTarget(x,y){let b=null,bd=1e9;state.queue.forEach(p=>{const r=p.g.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,d=(cx-x)**2+(cy-y)**2;if(d<bd){bd=d;b=p;}});return{p:b,d2:bd};}
function targetCenter(p){const r=p.g.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function setMagnet(p){
  const next=p?p.g:null;
  if(magnetEl&&magnetEl!==next)magnetEl.classList.remove('magnet');
  magnetEl=next;
  if(magnetEl)magnetEl.classList.add('magnet');
  if(ghost)ghost.classList.toggle('magnetized',!!magnetEl);
}
function magneticMove(x,y){
  if(!ghost||!dragP){moveGhost(x,y);return;}
  const br=board.getBoundingClientRect(),inside=x>=br.left&&x<=br.right&&y>=br.top&&y<=br.bottom;
  const{p:near,d2}=nearestTarget(x,y),r=dragP.g.getBoundingClientRect(),tol=Math.max(r.width,r.height,48),dist=Math.sqrt(d2);
  if(inside&&near===dragP&&dist<tol*1.75){
    const c=targetCenter(dragP),pull=Math.min(.74,Math.max(.24,1-dist/(tol*1.75)));
    moveGhost(x+(c.x-x)*pull,y+(c.y-y)*pull);
    setMagnet(dragP);
  }else{
    moveGhost(x,y);
    setMagnet(null);
  }
}
function hotTarget(x,y){const{p}=nearestTarget(x,y);if(hotEl&&hotEl!==(p&&p.g))hotEl.classList.remove('hot');if(p){p.g.classList.add('hot');hotEl=p.g;}}
function snapRing(x,y){const br=boardWrap.getBoundingClientRect(),ring=document.createElement('div');ring.className='snap-ring';ring.style.left=(x-br.left)+'px';ring.style.top=(y-br.top)+'px';boardWrap.appendChild(ring);requestAnimationFrame(()=>ring.classList.add('go'));setTimeout(()=>ring.remove(),520);}
function drop(x,y){const br=board.getBoundingClientRect(),inside=x>=br.left&&x<=br.right&&y>=br.top&&y<=br.bottom;const{p:near,d2}=nearestTarget(x,y),r=dragP.g.getBoundingClientRect(),tol=Math.max(r.width,r.height,48),ok=inside&&near===dragP&&Math.sqrt(d2)<tol*1.38;if(ok){const c=targetCenter(dragP);moveGhost(c.x,c.y);placeCorrect(dragP,c.x,c.y);}else placeWrong(dragP,(inside&&near&&near!==dragP)?near:null);cleanupDrag();}
function cleanupDrag(){setMagnet(null);if(ghost){ghost.remove();ghost=null;}if(dragEl)dragEl.classList.remove('dragging');if(hotEl){hotEl.classList.remove('hot');hotEl=null;}board.querySelectorAll('.hint').forEach(g=>g.classList.remove('hint'));dragP=null;dragEl=null;}

/* ===== 正誤 ===== */
function placeCorrect(p,x,y){
  const teamColor=state.mode==='group'?state.teams[state.turn].color:'#bfe3c8';
  p.g.classList.add('done');p.g.style.fill=teamColor;p.g.style.opacity=1;addBoardLabel(p);
  sOK();vib(40);
  if(x!=null){snapRing(x,y);confettiBurst(x,y,26);stampAt(x,y,'⭕');}
  const el=tray.querySelector(`.piece[data-romaji="${p.romaji}"]`);if(el)el.remove();
  state.queue=state.queue.filter(q=>q!==p);state.placed++;
  // マスター度＆お宝
  const before=stars(p.romaji);bumpMastery(p.romaji,DIFF[state.difficulty].stars);
  if(stars(p.romaji)>before){setTimeout(()=>{sStar();stampAt(x||boardWrap.clientWidth/2,y||boardWrap.clientHeight/2,'⭐');},220);}
  COLLECTED.add(p.romaji);localStorage.setItem('tdf_collected',JSON.stringify([...COLLECTED]));
  showTreasure(p);renderZukan();updateMasterPill();
  if(state.mode==='solo'){if(state.lastR&&ADJ[p.romaji]&&ADJ[p.romaji].includes(state.lastR)){state.combo++;if(state.combo>=2){showCombo(state.combo);}}else state.combo=1;state.lastR=p.romaji;}
  else{state.owner[p.romaji]=state.turn;state.teamScores[state.turn]++;if((ADJ[p.romaji]||[]).some(n=>state.owner[n]===state.turn)){state.teamScores[state.turn]++;flashToast('🔗 れんさ！ +1',state.teams[state.turn].color);}nextTurn();}
  renderHUD();
  if(state.queue.length===0)finish();
}
function placeWrong(p,wrongNear){
  state.miss++;sNG();vib([20,40,20]);if(state.mode==='solo')state.combo=0;if(state.mode==='group')nextTurn();renderHUD();
  const d=DIFF[state.difficulty];
  flashToast(`❌ ちがうよ${(d.name&&wrongNear)?`　ここは「${wrongNear.kanji}」`:''}`,'#ef4444');
  if(state.difficulty!=='hard'){p.g.classList.add('hint');setTimeout(()=>p.g.classList.remove('hint'),900);}
}
function addBoardLabel(p){const t=document.createElementNS(svgNS,'text');t.setAttribute('class','pref-label');t.setAttribute('x',p.cx);t.setAttribute('y',p.cy+3);t.setAttribute('font-size',Math.max(8,Math.min(p.bb.width,p.bb.height)*0.34));t.textContent=p.kanji.replace(/[都道府県]$/,'');board.querySelector('g.prefectures').appendChild(t);}

/* ===== ずかん（常時表示） ===== */
function renderZukan(){
  const grid=document.getElementById('zgrid');grid.innerHTML='';
  PREFS.slice().sort((a,b)=>REGION_ORDER.indexOf(a.region)-REGION_ORDER.indexOf(b.region)).forEach(p=>{
    const got=COLLECTED.has(p.romaji),h=HOZAI[p.romaji],st=stars(p.romaji);
    const ch=CHARA[p.romaji]||h;
    const c=document.createElement('div');c.className='zchip'+(got?' got':'');c.textContent=got?ch[0]:'❓';
    if(got&&st>0){const s=document.createElement('span');s.className='st';s.textContent='★'.repeat(st);c.appendChild(s);}
    c.title=got?`${p.kanji}：${ch[1]}（${h[1]}）`:'？？？';
    c.onclick=()=>{ if(got) flashToast(`${ch[0]} ${ch[1]}｜${p.kanji}　${ch[2]}`, '#1f2a3d'); };
    grid.appendChild(c);
  });
  document.getElementById('zcount').textContent=`${COLLECTED.size} / 47`;
}
function updateMasterPill(){document.getElementById('masterPill').textContent=`⭐ ${totalStars()} / 141`;}

/* ===== ポップ ===== */
let trsT=null;function showTreasure(p){const h=HOZAI[p.romaji],ch=CHARA[p.romaji]||h;if(!h)return;treasureEl.innerHTML=`<div class="titem">${ch[0]}</div><div class="tname">${p.kanji} キャラカード</div><div class="cname">${ch[1]}</div><div class="ctag">${ch[2]}</div><div class="ttrivia">${h[1]}：${h[2]}</div>`;treasureEl.classList.add('show');clearTimeout(trsT);trsT=setTimeout(()=>treasureEl.classList.remove('show'),2600);}
function showCombo(n){comboEl.textContent=`となりどうし！コンボ×${n}`;comboEl.classList.remove('pop');void comboEl.offsetWidth;comboEl.classList.add('pop');}
let toastT=null;function flashToast(m,c){toastEl.textContent=m;toastEl.style.background=c||'#1f2a3d';toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1100);}

/* ===== チーム ===== */
const TEAM_DEF=[{name:'あか',color:'#ef4444'},{name:'あお',color:'#2f6df0'},{name:'みどり',color:'#10b981'},{name:'きいろ',color:'#eab308'}];
function nextTurn(){state.turn=(state.turn+1)%state.teams.length;}

/* ===== HUD ===== */
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function renderHUD(){
  if(state.mode==='solo'){
    const stageTxt=state.quest?`${state.questIdx+1}/${REGION_ORDER.length}（${REGION_ORDER[state.questIdx]}）`:(state.region==='all'?'全国':state.region);
    hud.innerHTML=`<div class="hudrow"><span>難易度</span><b>${DIFF[state.difficulty].label}</b></div>
      <div class="hudrow"><span>🗾 地方</span><b>${stageTxt}</b></div>
      <div class="hudrow"><span>⏱ タイム</span><b id="hTime">${state.running?fmt(Math.floor((Date.now()-state.t0)/1000)):'0:00'}</b></div>
      <div class="hudrow"><span>✅ 正解</span><b>${state.placed} / ${state.total}</b></div>
      <div class="hudrow"><span>🔥 コンボ</span><b>${state.combo>1?'×'+state.combo:'―'}</b></div>
      <div class="bar"><i style="width:${state.total?state.placed/state.total*100:0}%"></i></div>`;
  }else{
    hud.innerHTML=`<div class="hudrow"><span>難易度</span><b>${DIFF[state.difficulty].label}</b></div>
      <div class="hudrow"><span>⏱ タイム</span><b id="hTime">${state.running?fmt(Math.floor((Date.now()-state.t0)/1000)):'0:00'}</b></div>
      <div class="hudrow"><span>✅ おいた</span><b>${state.placed} / ${state.total}</b></div>
      <div class="bar"><i style="width:${state.total?state.placed/state.total*100:0}%"></i></div><div id="teams"></div>`;
    const box=hud.querySelector('#teams');state.teams.forEach((t,i)=>{const c=document.createElement('div');c.className='teamchip'+(i===state.turn?' turn':'');c.style.color=t.color;c.style.background=t.color+'22';c.style.borderColor=t.color;c.innerHTML=`${t.name}<br><b>${state.teamScores[i]}</b>`;box.appendChild(c);});
  }
}
function tick(){const e=document.getElementById('hTime');if(e)e.textContent=fmt(Math.floor((Date.now()-state.t0)/1000));}

/* ===== 出題・開始 ===== */
function regionList(rg){let l=PREFS.filter(p=>rg==='all'?true:p.region===rg);for(let i=l.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[l[i],l[j]]=[l[j],l[i]];}return l;}
function focusRegion(rg){if(rg==='all'){board.classList.remove('regionfocus');board.querySelectorAll('g.prefecture').forEach(g=>g.classList.remove('active'));}else{board.classList.add('regionfocus');board.querySelectorAll('g.prefecture').forEach(g=>{const p=PREFS.find(x=>x.g===g);g.classList.toggle('active',p&&p.region===rg);});}}
function resetBoard(){board.querySelectorAll('g.prefecture').forEach(g=>{g.classList.remove('done','hot','hint');g.style.fill='';g.style.opacity='';});board.querySelectorAll('text.pref-label').forEach(t=>t.remove());}
function startRound(rg){
  state.region=rg;state.queue=regionList(rg);state.total=state.queue.length;state.placed=0;state.miss=0;state.combo=0;state.lastR=null;state.turn=0;state.owner={};
  if(state.mode==='group'){const n=state.teamCount;state.teams=TEAM_DEF.slice(0,n);state.teamScores=new Array(n).fill(0);}else state.teams=[];
  resetBoard();focusRegion(rg);buildTray();renderHUD();renderZukan();updateMasterPill();
  hideOverlays();state.running=true;state.t0=Date.now();clearInterval(state.timer);state.timer=setInterval(tick,500);
}
function startQuest(){state.quest=true;state.questIdx=0;startRound(REGION_ORDER[0]);}
function finish(){state.running=false;clearInterval(state.timer);
  if(state.mode==='group'){sWin();vib([60,40,60,40,120]);showGroupResult();return;}
  const secs=Math.floor((Date.now()-state.t0)/1000);
  if(state.quest&&state.questIdx<REGION_ORDER.length-1){sWin();confettiBurst(boardWrap.clientWidth/2+boardWrap.getBoundingClientRect().left,boardWrap.clientHeight/2+boardWrap.getBoundingClientRect().top,30);vib([60,40,120]);showStageClear(secs);}
  else{sWin();vib([60,40,60,40,200]);for(let i=0;i<4;i++)setTimeout(()=>confettiBurst(boardWrap.getBoundingClientRect().left+boardWrap.clientWidth*Math.random(),boardWrap.getBoundingClientRect().top+boardWrap.clientHeight*0.4,16),i*180);showSoloResult(secs);}
}
function hideOverlays(){startOv.classList.add('hide');stageOv.classList.add('hide');resultOv.classList.add('hide');}
function showStageClear(secs){const region=REGION_ORDER[state.questIdx];const got=PREFS.filter(p=>p.region===region).map(p=>HOZAI[p.romaji][0]).join(' ');document.getElementById('stTitle').textContent=`${region} せいは！ 🎉`;document.getElementById('stBody').innerHTML=`<p style="font-size:15px;">タイム <b>${fmt(secs)}</b>／ミス <b>${state.miss}</b></p><p style="font-size:22px;">${got}</p><p style="color:#6b7891;font-size:13px;">お宝ゲット！次の地方へ。</p>`;document.getElementById('stNext').textContent=`▶ ${REGION_ORDER[state.questIdx+1]} へ`;stageOv.classList.remove('hide');}
function showSoloResult(secs){let medal='🥉',title='クリア！';if(state.miss===0){medal='🥇';title='パーフェクト！';}else if(state.miss<=3){medal='🥈';title='すごい！';}const k='tdf_best_'+(state.quest?'quest':state.region)+'_'+state.difficulty,cur=JSON.parse(localStorage.getItem(k)||'null');let nb=false;if(!cur||secs<cur){localStorage.setItem(k,secs);nb=true;}document.getElementById('rMedal').textContent=state.quest?'👑':medal;document.getElementById('rTitle').textContent=state.quest?'日本一周 せいは！👑':title;const acc=Math.round(state.placed/(state.placed+state.miss||1)*100);document.getElementById('rBody').innerHTML=`<p style="font-size:15px;">タイム <b>${fmt(secs)}</b>／ミス <b>${state.miss}</b>／正答率 <b>${acc}%</b>${nb?' <span style="color:#10b981;">✨自己ベスト！</span>':''}</p><p style="color:#6b7891;font-size:13px;">マスター度 ⭐ ${totalStars()} / 141　｜　お宝 ${COLLECTED.size} / 47</p>`;resultOv.classList.remove('hide');}
function showGroupResult(){const max=Math.max(...state.teamScores),win=state.teams.filter((t,i)=>state.teamScores[i]===max);document.getElementById('rMedal').textContent='🏆';document.getElementById('rTitle').textContent=win.length===1?`${win[0].name}チームの勝ち！`:'引き分け！';document.getElementById('rBody').innerHTML='<p style="font-size:16px;">'+state.teams.map((t,i)=>`<span style="color:${t.color};font-weight:800;">${t.name} ${state.teamScores[i]}</span>`).join('　')+'</p>';resultOv.classList.remove('hide');}

/* ===== メニュー ===== */
function diffPicker(onPick){
  const row=document.createElement('div');row.className='pickrow diffrow';
  ['easy','normal','hard'].forEach(d=>{const b=document.createElement('button');b.className='pick'+(state.difficulty===d?' on':'');b.dataset.d=d;b.textContent=(d==='easy'?'🟢 ':d==='normal'?'🟡 ':'🔴 ')+DIFF[d].label;b.onclick=()=>{state.difficulty=d;row.querySelectorAll('.pick').forEach(x=>{x.classList.remove('on');});b.classList.add('on');if(onPick)onPick();};row.appendChild(b);});
  return row;
}
function buildMenu(){
  updateMasterPill();renderZukan();
  if(state.mode==='solo'){
    startCard.innerHTML='<div class="medal">🧳</div><h2>個人モード：日本一周</h2><p style="font-size:13.5px;color:#41506b;">県名ピースを正しい場所へ。北→南へ旅して、ご当地お宝を集めよう。むずかしいで置けると⭐3！</p>';
    const dl=document.createElement('div');dl.style.cssText='font-size:13px;color:#6b7891;margin-top:8px;';dl.textContent='難易度（むずかしい＝県名なし・形だけ）';startCard.appendChild(dl);startCard.appendChild(diffPicker());
    const pr=document.createElement('div');pr.className='pickrow';pr.style.marginTop='10px';const qb=document.createElement('button');qb.className='btn';qb.style.cssText='font-size:16px;padding:11px 22px;';qb.textContent='▶ 日本一周をはじめる';qb.onclick=()=>{state.quest=true;state.questIdx=0;startRound(REGION_ORDER[0]);};pr.appendChild(qb);startCard.appendChild(pr);
    const pm=document.createElement('p');pm.style.cssText='font-size:12px;color:#6b7891;margin:8px 0 2px;';pm.innerHTML=`マスター度 ⭐ ${totalStars()} / 141　｜　お宝 ${COLLECTED.size} / 47`;startCard.appendChild(pm);
    const lab=document.createElement('div');lab.style.cssText='font-size:12px;color:#6b7891;margin-top:6px;';lab.textContent='▼ 地方だけ練習';startCard.appendChild(lab);
    const grid=document.createElement('div');grid.className='regiongrid';REGION_ORDER.forEach(r=>{const b=document.createElement('button');b.className='pick';b.textContent=r;b.onclick=()=>{state.quest=false;startRound(r);};grid.appendChild(b);});startCard.appendChild(grid);
  }else{
    startCard.innerHTML='<div class="medal">⚔️</div><h2>陣取りバトル</h2><p style="font-size:13.5px;color:#41506b;">チームで交代しながら県を取り合おう。正解でその県が自分の色に！自分の領地のとなりを取ると「れんさ」でボーナス。</p>';
    const dl=document.createElement('div');dl.style.cssText='font-size:13px;color:#6b7891;margin-top:8px;';dl.textContent='難易度';startCard.appendChild(dl);startCard.appendChild(diffPicker());
    const tl=document.createElement('div');tl.style.cssText='font-size:13px;color:#6b7891;margin-top:10px;';tl.textContent='チーム数';startCard.appendChild(tl);
    const tp=document.createElement('div');tp.className='pickrow';[2,3,4].forEach(n=>{const b=document.createElement('button');b.className='pick'+(state.teamCount===n?' on':'');b.textContent=n+'チーム';b.onclick=()=>{state.teamCount=n;tp.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));b.classList.add('on');};tp.appendChild(b);});startCard.appendChild(tp);
    const al=document.createElement('div');al.style.cssText='font-size:13px;color:#6b7891;margin-top:10px;';al.textContent='エリア';startCard.appendChild(al);
    const rg=document.createElement('div');rg.className='regiongrid';const ab=document.createElement('button');ab.className='pick'+(state.gRegion==='all'?' on':'');ab.textContent='全国';ab.onclick=()=>{state.gRegion='all';rg.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));ab.classList.add('on');};rg.appendChild(ab);REGION_ORDER.forEach(r=>{const b=document.createElement('button');b.className='pick'+(state.gRegion===r?' on':'');b.textContent=r;b.onclick=()=>{state.gRegion=r;rg.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));b.classList.add('on');};rg.appendChild(b);});startCard.appendChild(rg);
    const pr=document.createElement('div');pr.className='pickrow';pr.style.marginTop='12px';const gb=document.createElement('button');gb.className='btn';gb.style.cssText='font-size:16px;padding:11px 22px;';gb.textContent='▶ バトル開始';gb.onclick=()=>{state.quest=false;startRound(state.gRegion);};pr.appendChild(gb);startCard.appendChild(pr);
  }
}
function showMenu(){state.running=false;clearInterval(state.timer);hideOverlays();buildMenu();startOv.classList.remove('hide');}
function setMode(m){state.mode=m;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));showMenu();}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
document.getElementById('homeBtn').onclick=showMenu;
document.getElementById('menuBtn').onclick=showMenu;
document.getElementById('againBtn').onclick=()=>{if(state.mode==='group')startRound(state.gRegion);else if(state.quest)startQuest();else startRound(state.region);};
document.getElementById('stNext').onclick=()=>{state.questIdx++;startRound(REGION_ORDER[state.questIdx]);};

renderHUD();renderZukan();setMode('solo');
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>
