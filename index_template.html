<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>日本一周！都道府県せいはの旅｜4年社会</title>
<meta name="theme-color" content="#2f6df0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="都道府県パズル">
<style>
  :root{
    --bg:#eef3fb; --ink:#21304a; --line:#d4ddec; --accent:#2f6df0; --accent2:#10b981;
    --warn:#ef4444; --gold:#f4b400; --panel:#ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; overflow:hidden;}
  header{background:linear-gradient(135deg,#e7f0ff,#e9fff5); border-bottom:1px solid var(--line); padding:6px 12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  header h1{font-size:16px; margin:0; letter-spacing:.5px;}
  header .grow{flex:1;}
  .tabs{display:flex; gap:6px;}
  .tab{border:none; background:#e2e9f5; color:#56678a; font-weight:700; font-size:13px; padding:7px 12px; border-radius:10px; cursor:pointer; font-family:inherit;}
  .tab.on{background:var(--accent); color:#fff;}
  .ctrl{display:flex; align-items:center; gap:8px; font-size:13px;}
  select,.btn{font-family:inherit; font-size:13px; border-radius:9px; border:1.5px solid var(--line); padding:6px 9px; background:#fff; color:var(--ink);}
  .btn{font-weight:700; cursor:pointer; border-color:transparent; background:var(--accent); color:#fff;}
  .btn.sub{background:#eaeef5; color:#41506b;}
  .btn.sm{padding:5px 9px; font-size:12px;}
  .switch{display:inline-flex; align-items:center; gap:5px; font-size:13px; cursor:pointer; user-select:none;}
  .switch input{display:none;}
  .switch .track{width:38px; height:22px; border-radius:11px; background:#cbd5e6; position:relative; transition:.15s;}
  .switch .track::after{content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.15s;}
  .switch input:checked + .track{background:var(--accent2);}
  .switch input:checked + .track::after{transform:translateX(16px);}

  #app{display:flex; height:calc(100% - 46px);}
  #stage{flex:1; position:relative; display:flex; align-items:center; justify-content:center; padding:8px;}
  #boardWrap{position:relative; width:100%; height:100%;}
  svg#board{width:100%; height:100%; touch-action:none;}
  #board .prefecture{ fill:#e7edf7; stroke:#b7c3d8; stroke-width:1; transition:fill .2s; }
  #board .prefecture.done{ stroke:#74839d; }
  #board .prefecture.hot{ fill:#cfe0ff !important; }
  #board .pref-label{ font-weight:800; fill:#1c2840; pointer-events:none; text-anchor:middle; paint-order:stroke; stroke:#ffffff; stroke-width:2.6px; stroke-linejoin:round; }
  #board.regionfocus .prefecture{ opacity:.16; }
  #board.regionfocus .prefecture.active{ opacity:1; }

  #side{width:240px; min-width:240px; background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column;}
  #hud{padding:10px 12px; border-bottom:1px solid var(--line);}
  .hudrow{display:flex; justify-content:space-between; font-size:13px; margin:3px 0;}
  .hudrow b{font-size:15px;}
  .bar{height:9px; background:#e6ecf6; border-radius:6px; overflow:hidden; margin-top:6px;}
  .bar>i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s;}
  #teams{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;}
  .teamchip{flex:1; min-width:60px; text-align:center; border-radius:9px; padding:5px; font-size:12px; font-weight:700; border:2px solid;}
  .teamchip.turn{box-shadow:0 0 0 3px #fff, 0 0 0 5px currentColor;}
  #trayTitle{padding:8px 12px 2px; font-size:12px; color:#6b7891; font-weight:700;}
  #tray{flex:1; overflow-y:auto; padding:6px 10px 12px; display:flex; flex-direction:column; gap:8px;}
  .piece{position:relative; background:#fff; border:2px solid var(--line); border-radius:12px; padding:4px; display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none; box-shadow:0 1px 3px rgba(20,40,80,.08);}
  .piece:active{cursor:grabbing;}
  .piece svg{width:84px; height:66px; display:block; overflow:visible;}
  .piece .pp{ fill:#cdeed5; stroke:#2f9d68; stroke-width:1.6; }
  .piece .plabel{ font-weight:800; fill:#0f3a25; text-anchor:middle; dominant-baseline:middle; paint-order:stroke; stroke:#ffffff; stroke-width:3.6px; stroke-linejoin:round; }
  .piece .pfuri{ font-weight:700; fill:#2c7a52; text-anchor:middle; paint-order:stroke; stroke:#ffffff; stroke-width:2.4px; stroke-linejoin:round; }
  .piece.dragging{opacity:.35;}
  .ghost{position:fixed; z-index:60; pointer-events:none; transform:translate(-50%,-50%); box-shadow:0 8px 20px rgba(20,40,80,.25);}

  .overlay{position:absolute; inset:0; background:rgba(238,243,251,.97); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; z-index:80; padding:18px;}
  .overlay.hide{display:none;}
  .card{background:#fff; border-radius:18px; padding:18px 22px; box-shadow:0 8px 30px rgba(20,40,80,.14); max-width:460px; width:100%;}
  .card h2{margin:4px 0; font-size:23px;}
  .medal{font-size:46px;}
  .pickrow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px;}
  .pick{border:2px solid var(--line); background:#fff; border-radius:12px; padding:8px 12px; font-weight:700; cursor:pointer; font-family:inherit; font-size:13px;}
  .pick.on{border-color:var(--accent); background:#eef4ff;}
  .regiongrid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px;}
  .regiongrid .pick.lock{opacity:.45;}
  .toast{position:absolute; top:12px; left:50%; transform:translateX(-50%); background:#1f2a3d; color:#fff; padding:8px 16px; border-radius:20px; font-weight:700; font-size:14px; opacity:0; transition:.18s; z-index:90; pointer-events:none; white-space:nowrap;}
  .toast.show{opacity:1;}
  /* お宝ポップ */
  .treasure{position:absolute; left:50%; bottom:18px; transform:translateX(-50%) translateY(20px); background:#fff; border:2px solid var(--gold); border-radius:16px; padding:10px 16px; box-shadow:0 8px 24px rgba(20,40,80,.18); opacity:0; transition:.25s; z-index:88; max-width:84%; text-align:center;}
  .treasure.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .treasure .tname{font-weight:800; font-size:15px;}
  .treasure .titem{font-size:18px; margin:2px 0;}
  .treasure .ttrivia{font-size:12.5px; color:#5b6b85;}
  .combo{position:absolute; top:42%; left:50%; transform:translate(-50%,-50%) scale(.6); font-weight:900; font-size:40px; color:var(--gold); text-shadow:0 2px 0 #fff,0 0 14px rgba(244,180,0,.6); opacity:0; pointer-events:none; z-index:92;}
  .combo.pop{animation:comboPop .8s ease-out;}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}25%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}70%{opacity:1;transform:translate(-50%,-60%) scale(1);}100%{opacity:0;transform:translate(-50%,-80%) scale(1);}}
  footer{position:absolute; bottom:4px; left:8px; font-size:10px; color:#9aa6bd;}
  @media (max-width:720px){ #side{width:176px; min-width:176px;} .piece svg{width:64px; height:54px;} header h1{font-size:14px;} }
</style>
</head>
<body>
<header>
  <h1>🗾 日本一周！都道府県せいはの旅</h1>
  <div class="tabs">
    <button class="tab on" data-mode="solo">👤 個人（日本一周）</button>
    <button class="tab" data-mode="group">👥 グループ（陣取り）</button>
  </div>
  <div class="grow"></div>
  <div class="ctrl">
    <label class="switch"><input type="checkbox" id="furiToggle" checked><span class="track"></span>ふりがな</label>
    <button class="btn sm sub" id="homeBtn">メニュー</button>
  </div>
</header>

<div id="app">
  <div id="stage">
    <div id="boardWrap">
      <!--MAP_SVG-->
      <div class="toast" id="toast"></div>
      <div class="treasure" id="treasure"></div>
      <div class="combo" id="combo"></div>
      <footer>地図：Geolonia「Japanese Prefectures」(MIT)</footer>
    </div>

    <!-- メニュー / スタート -->
    <div class="overlay" id="startOv">
      <div class="card" id="startCard"><!-- JSで構築 --></div>
    </div>
    <!-- 地方クリア -->
    <div class="overlay hide" id="stageOv">
      <div class="card">
        <div class="medal">🎁</div>
        <h2 id="stTitle">地方クリア！</h2>
        <div id="stBody"></div>
        <div class="pickrow"><button class="btn" id="stNext">次の地方へ ▶</button></div>
      </div>
    </div>
    <!-- 結果 -->
    <div class="overlay hide" id="resultOv">
      <div class="card">
        <div class="medal" id="rMedal">🏅</div>
        <h2 id="rTitle">クリア！</h2>
        <div id="rBody"></div>
        <div class="pickrow">
          <button class="btn" id="againBtn">もう一回</button>
          <button class="btn sub" id="menuBtn">メニューへ</button>
        </div>
      </div>
    </div>
  </div>

  <div id="side">
    <div id="hud"></div>
    <div id="trayTitle">ピース（ドラッグして置く）</div>
    <div id="tray"></div>
  </div>
</div>

<script>
/* ===== ふりがな・地方 ===== */
const FURI={hokkaido:["北海道","ほっかいどう"],aomori:["青森県","あおもり"],iwate:["岩手県","いわて"],miyagi:["宮城県","みやぎ"],akita:["秋田県","あきた"],yamagata:["山形県","やまがた"],fukushima:["福島県","ふくしま"],ibaraki:["茨城県","いばらき"],tochigi:["栃木県","とちぎ"],gunma:["群馬県","ぐんま"],saitama:["埼玉県","さいたま"],chiba:["千葉県","ちば"],tokyo:["東京都","とうきょう"],kanagawa:["神奈川県","かながわ"],niigata:["新潟県","にいがた"],toyama:["富山県","とやま"],ishikawa:["石川県","いしかわ"],fukui:["福井県","ふくい"],yamanashi:["山梨県","やまなし"],nagano:["長野県","ながの"],gifu:["岐阜県","ぎふ"],shizuoka:["静岡県","しずおか"],aichi:["愛知県","あいち"],mie:["三重県","みえ"],shiga:["滋賀県","しが"],kyoto:["京都府","きょうと"],osaka:["大阪府","おおさか"],hyogo:["兵庫県","ひょうご"],nara:["奈良県","なら"],wakayama:["和歌山県","わかやま"],tottori:["鳥取県","とっとり"],shimane:["島根県","しまね"],okayama:["岡山県","おかやま"],hiroshima:["広島県","ひろしま"],yamaguchi:["山口県","やまぐち"],tokushima:["徳島県","とくしま"],kagawa:["香川県","かがわ"],ehime:["愛媛県","えひめ"],kochi:["高知県","こうち"],fukuoka:["福岡県","ふくおか"],saga:["佐賀県","さが"],nagasaki:["長崎県","ながさき"],kumamoto:["熊本県","くまもと"],oita:["大分県","おおいた"],miyazaki:["宮崎県","みやざき"],kagoshima:["鹿児島県","かごしま"],okinawa:["沖縄県","おきなわ"]};
const REGION={hokkaido:"北海道",tohoku:"東北",kanto:"関東",chubu:"中部",kinki:"近畿",chugoku:"中国",shikoku:"四国","kyushu-okinawa":"九州・沖縄"};
const REGION_ORDER=["北海道","東北","関東","中部","近畿","中国","四国","九州・沖縄"];

/* ===== 隣接（陸続き・コンボ／連鎖用） ===== */
const ADJ={hokkaido:[],aomori:["iwate","akita"],iwate:["aomori","akita","miyagi"],miyagi:["iwate","akita","yamagata","fukushima"],akita:["aomori","iwate","miyagi","yamagata"],yamagata:["akita","miyagi","fukushima","niigata"],fukushima:["miyagi","yamagata","niigata","gunma","tochigi","ibaraki"],ibaraki:["fukushima","tochigi","saitama","chiba"],tochigi:["fukushima","ibaraki","gunma","saitama"],gunma:["fukushima","tochigi","saitama","nagano","niigata"],saitama:["gunma","tochigi","ibaraki","chiba","tokyo","yamanashi","nagano"],chiba:["ibaraki","saitama","tokyo"],tokyo:["saitama","chiba","kanagawa","yamanashi"],kanagawa:["tokyo","yamanashi","shizuoka"],niigata:["yamagata","fukushima","gunma","nagano","toyama"],toyama:["niigata","nagano","gifu","ishikawa"],ishikawa:["toyama","gifu","fukui"],fukui:["ishikawa","gifu","shiga","kyoto"],yamanashi:["saitama","tokyo","kanagawa","shizuoka","nagano"],nagano:["niigata","gunma","saitama","yamanashi","shizuoka","aichi","gifu","toyama"],gifu:["toyama","ishikawa","fukui","nagano","aichi","mie","shiga"],shizuoka:["kanagawa","yamanashi","nagano","aichi"],aichi:["nagano","gifu","mie","shizuoka"],mie:["gifu","aichi","shiga","kyoto","nara","wakayama"],shiga:["fukui","gifu","mie","kyoto"],kyoto:["fukui","shiga","mie","nara","osaka","hyogo"],osaka:["kyoto","nara","wakayama","hyogo"],hyogo:["kyoto","osaka","tottori","okayama"],nara:["kyoto","mie","osaka","wakayama"],wakayama:["mie","nara","osaka"],tottori:["hyogo","okayama","shimane"],shimane:["tottori","hiroshima","yamaguchi"],okayama:["hyogo","tottori","hiroshima"],hiroshima:["shimane","okayama","yamaguchi"],yamaguchi:["shimane","hiroshima"],tokushima:["kagawa","ehime","kochi"],kagawa:["tokushima","ehime"],ehime:["kagawa","tokushima","kochi"],kochi:["tokushima","ehime"],fukuoka:["saga","oita","kumamoto"],saga:["fukuoka","nagasaki"],nagasaki:["saga"],kumamoto:["fukuoka","oita","miyazaki","kagoshima"],oita:["fukuoka","kumamoto","miyazaki"],miyazaki:["kumamoto","oita","kagoshima"],kagoshima:["kumamoto","miyazaki"],okinawa:[]};

/* ===== ご当地お宝（名物＋豆知識） ===== */
const HOZAI={hokkaido:["🥔","じゃがいも・牛乳","日本一広い。面積は全国の約2割。"],aomori:["🍎","りんご","りんごの生産が日本一。"],iwate:["🍜","わんこそば","本州でいちばん広い県。"],miyagi:["🐟","ぎゅうたん・笹かまぼこ","東北の中心都市・仙台がある。"],akita:["🐕","きりたんぽ・あきた犬","「なまはげ」で有名。"],yamagata:["🍒","さくらんぼ","さくらんぼの生産が日本一。"],fukushima:["🍑","もも","東北でいちばん南の県。"],ibaraki:["🫘","なっとう","なっとうで有名。"],tochigi:["🍓","いちご","いちごの生産が日本一。日光がある。"],gunma:["🥬","こんにゃく・キャベツ","海に面していない内陸の県。"],saitama:["🌿","ねぎ・さといも","東京の北どなり。"],chiba:["🥜","らっかせい・しょうゆ","成田空港やディズニーがある。"],tokyo:["🗼","東京タワー・スカイツリー","日本の首都。人口が日本一。"],kanagawa:["🚢","横浜・中華街","港町・横浜がある。"],niigata:["🍚","こめ（コシヒカリ）","米の産地で雪が多い。"],toyama:["💊","くすり・ほたるいか","「くすりの富山」で有名。"],ishikawa:["🎨","金ぱく・輪島ぬり","金ぱくの生産が日本一。"],fukui:["🦕","きょうりゅう・めがね","めがねづくりときょうりゅう博物館。"],yamanashi:["🍇","ぶどう・もも","ぶどう・ももが日本一。富士山がある。"],nagano:["🍎","りんご・そば","海に面していない山の多い県。"],gifu:["🏠","白川郷","海に面していない内陸の県。"],shizuoka:["🍵","お茶","お茶の生産が日本一。富士山がある。"],aichi:["🚗","自動車","自動車づくりがさかん。名古屋がある。"],mie:["🦐","いせえび・しんじゅ","しんじゅの養しょくで有名。"],shiga:["🌊","びわ湖","日本一大きい湖「びわ湖」がある。"],kyoto:["⛩","お寺・神社","昔の都。古い建物が多い。"],osaka:["🐙","たこやき","西日本の中心都市。"],hyogo:["🐄","こうべ牛","明石海きょう大橋がある。"],nara:["🦌","しか・大ぶつ","しかと大ぶつで有名。昔の都。"],wakayama:["🍊","みかん・うめ","うめの生産が日本一。"],tottori:["🏜","とっとり砂きゅう","人口が日本一少ない。"],shimane:["⛩","出雲大社","出雲大社で有名。"],okayama:["🍑","ももたろう・きびだんご","「ももたろう」のお話で有名。"],hiroshima:["🦪","かき・もみじまんじゅう","かきの養しょくが日本一。"],yamaguchi:["🐡","ふぐ","本州のいちばん西。ふぐ料理。"],tokushima:["💃","阿波おどり","「阿波おどり」で有名。"],kagawa:["🍜","さぬきうどん","日本でいちばん面積が小さい県。"],ehime:["🍊","みかん","みかんづくりがさかん。"],kochi:["🐟","かつお","かつおりょうで有名。"],fukuoka:["🍜","とんこつラーメン・めんたいこ","九州の中心都市・福岡がある。"],saga:["🍵","有田焼","焼き物（有田焼）で有名。"],nagasaki:["🍜","ちゃんぽん","島がとても多い。"],kumamoto:["🐻","くまモン・すいか","「くまモン」で有名。"],oita:["♨️","おんせん","おんせんの数が日本一。"],miyazaki:["🥭","マンゴー・チキン南ばん","マンゴーで有名。"],kagoshima:["🌋","さくらじま・さつまいも","火山「さくらじま」がある。"],okinawa:["🌺","ゴーヤー・シーサー","日本のいちばん南。あたたかい島。"]};

/* ===== 盤面から県情報抽出 ===== */
const board=document.getElementById('board'); const svgNS="http://www.w3.org/2000/svg";
let PREFS=[];
function regionOf(cls){ if(cls.includes('hokkaido'))return'北海道'; if(cls.includes('kyushu-okinawa'))return'九州・沖縄'; for(const t of cls.split(' '))if(REGION[t])return REGION[t]; return'その他';}
(function buildPrefs(){
  board.querySelectorAll('g.prefecture').forEach(g=>{
    const cls=g.getAttribute('class'); const romaji=cls.split(' ')[0]; const meta=FURI[romaji]; if(!meta)return;
    const bb=g.getBBox(); const m=g.transform.baseVal.consolidate(); const tx=m?m.matrix.e:0,ty=m?m.matrix.f:0;
    PREFS.push({romaji,kanji:meta[0],furi:meta[1],region:regionOf(cls),g,bb,cx:tx+bb.x+bb.width/2,cy:ty+bb.y+bb.height/2});
    g.classList.add('pref-target'); g.dataset.romaji=romaji;
  });
})();
const byRomaji=r=>PREFS.find(p=>p.romaji===r);

/* ===== 状態 ===== */
const state={mode:'solo',region:'all',furi:true,quest:false,questIdx:0,queue:[],placed:0,miss:0,total:0,
  t0:0,timer:null,running:false,combo:0,lastRomaji:null,
  teams:[],turn:0,teamScores:[],owner:{},
  collected:new Set(JSON.parse(localStorage.getItem('tdf_collected')||'[]'))};

/* 参照 */
const tray=document.getElementById('tray'), hud=document.getElementById('hud');
const toastEl=document.getElementById('toast'), treasureEl=document.getElementById('treasure'), comboEl=document.getElementById('combo');
const startOv=document.getElementById('startOv'), startCard=document.getElementById('startCard');
const stageOv=document.getElementById('stageOv'), resultOv=document.getElementById('resultOv');

/* ===== サウンド ===== */
let AC=null;
function beep(f,d,t='sine',v=.14){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(AC.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.stop(AC.currentTime+d);}catch(e){}}
const sOK=()=>{beep(660,.08,'triangle');setTimeout(()=>beep(990,.12,'triangle'),70);};
const sNG=()=>beep(150,.18,'sawtooth',.1);
const sCombo=n=>[0,1,2].forEach(i=>setTimeout(()=>beep(700+n*120+i*160,.09,'triangle'),i*60));
const sWin=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.16,'triangle'),i*120));

/* ===== ピース ===== */
function makePieceSVG(p){
  const svg=document.createElementNS(svgNS,'svg'),pad=8;
  svg.setAttribute('viewBox',`${p.bb.x-pad} ${p.bb.y-pad} ${p.bb.width+pad*2} ${p.bb.height+pad*2}`);
  const clone=p.g.cloneNode(true); clone.removeAttribute('transform'); clone.removeAttribute('class'); clone.removeAttribute('fill');
  clone.querySelectorAll('title').forEach(t=>t.remove());
  clone.querySelectorAll('path,polygon,line').forEach(el=>{el.setAttribute('class','pp');el.removeAttribute('fill');el.removeAttribute('stroke');el.removeAttribute('stroke-width');});
  svg.appendChild(clone);
  const fs=Math.max(13,Math.min(p.bb.width,p.bb.height)*0.46);
  const cx=p.bb.x+p.bb.width/2, cyc=p.bb.y+p.bb.height/2;
  const t=document.createElementNS(svgNS,'text'); t.setAttribute('class','plabel'); t.setAttribute('x',cx);
  t.setAttribute('y',state.furi?cyc-fs*0.16:cyc); t.setAttribute('font-size',fs); t.textContent=p.kanji.replace(/[都道府県]$/,'');
  svg.appendChild(t);
  if(state.furi){const f=document.createElementNS(svgNS,'text');f.setAttribute('class','pfuri');f.setAttribute('x',cx);f.setAttribute('y',cyc+fs*0.62);f.setAttribute('font-size',fs*0.5);f.textContent=p.furi;svg.appendChild(f);}
  return svg;
}
function buildTray(){tray.innerHTML=''; state.queue.forEach(p=>{const d=document.createElement('div');d.className='piece';d.dataset.romaji=p.romaji;d.appendChild(makePieceSVG(p));tray.appendChild(d);attachDrag(d,p);});}

/* ===== ドラッグ＆ドロップ（pointer） ===== */
let ghost=null,dragP=null,dragEl=null,hotEl=null;
function attachDrag(el,p){
  el.addEventListener('pointerdown',e=>{ if(!state.running)return; e.preventDefault();
    dragP=p;dragEl=el;el.classList.add('dragging');
    ghost=el.cloneNode(true); ghost.classList.add('ghost'); ghost.classList.remove('dragging'); // piece クラスは残す＝色が黒くならない
    ghost.style.width=el.offsetWidth+'px'; document.body.appendChild(ghost);
    moveGhost(e.clientX,e.clientY); el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove',e=>{if(dragP===p){e.preventDefault();moveGhost(e.clientX,e.clientY);hotTarget(e.clientX,e.clientY);}});
  el.addEventListener('pointerup',e=>{if(dragP===p)drop(e.clientX,e.clientY);});
  el.addEventListener('pointercancel',()=>{if(dragP===p)cleanupDrag();});
}
function moveGhost(x,y){if(ghost){ghost.style.left=x+'px';ghost.style.top=y+'px';}}
function nearestTarget(x,y){let best=null,bd=1e9;state.queue.forEach(p=>{const r=p.g.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;const d=(cx-x)**2+(cy-y)**2;if(d<bd){bd=d;best=p;}});return{p:best,d2:bd};}
function hotTarget(x,y){const{p}=nearestTarget(x,y);if(hotEl&&hotEl!==(p&&p.g))hotEl.classList.remove('hot');if(p){p.g.classList.add('hot');hotEl=p.g;}}
function drop(x,y){
  const br=board.getBoundingClientRect(); const inside=x>=br.left&&x<=br.right&&y>=br.top&&y<=br.bottom;
  const{p:near,d2}=nearestTarget(x,y); const r=dragP.g.getBoundingClientRect(); const tol=Math.max(r.width,r.height,48);
  if(inside&&near===dragP&&Math.sqrt(d2)<tol*1.3) placeCorrect(dragP); else placeWrong(dragP,(inside&&near&&near!==dragP)?near:null);
  cleanupDrag();
}
function cleanupDrag(){if(ghost){ghost.remove();ghost=null;}if(dragEl)dragEl.classList.remove('dragging');if(hotEl){hotEl.classList.remove('hot');hotEl=null;}dragP=null;dragEl=null;}

/* ===== 正誤 ===== */
function placeCorrect(p){
  const teamColor=state.mode==='group'?state.teams[state.turn].color:'#bfe3c8';
  p.g.classList.add('done'); p.g.style.fill=teamColor; p.g.style.opacity=1;
  addBoardLabel(p); sOK();
  const el=tray.querySelector(`.piece[data-romaji="${p.romaji}"]`); if(el)el.remove();
  state.queue=state.queue.filter(q=>q!==p); state.placed++;
  // お宝
  showTreasure(p); state.collected.add(p.romaji); localStorage.setItem('tdf_collected',JSON.stringify([...state.collected]));
  if(state.mode==='solo'){
    // 隣接コンボ
    if(state.lastRomaji && ADJ[p.romaji] && ADJ[p.romaji].includes(state.lastRomaji)){ state.combo++; if(state.combo>=2){showCombo(state.combo);sCombo(state.combo);} }
    else state.combo=1;
    state.lastRomaji=p.romaji;
  }else{
    // 陣取り：連鎖（自チームの領地に隣接？）
    state.owner[p.romaji]=state.turn; state.teamScores[state.turn]++;
    const chain=(ADJ[p.romaji]||[]).some(n=>state.owner[n]===state.turn);
    if(chain){ state.teamScores[state.turn]++; flashToast('🔗 れんさ！ +1',state.teams[state.turn].color); }
    nextTurn();
  }
  renderHUD();
  if(state.queue.length===0) finish();
}
function placeWrong(p,wrongNear){
  state.miss++; sNG(); if(state.mode==='solo')state.combo=0;
  if(state.mode==='group')nextTurn();
  renderHUD();
  flashToast(`❌ もう一度！${wrongNear?` ここは「${wrongNear.kanji}」`:''}`,'#ef4444');
  p.g.classList.add('hot'); setTimeout(()=>p.g.classList.remove('hot'),650);
}
function addBoardLabel(p){const t=document.createElementNS(svgNS,'text');t.setAttribute('class','pref-label');t.setAttribute('x',p.cx);t.setAttribute('y',p.cy+3);t.setAttribute('font-size',Math.max(8,Math.min(p.bb.width,p.bb.height)*0.34));t.textContent=p.kanji.replace(/[都道府県]$/,'');board.querySelector('g.prefectures').appendChild(t);}

/* お宝ポップ */
let trsT=null;
function showTreasure(p){const h=HOZAI[p.romaji];if(!h)return;treasureEl.innerHTML=`<div class="titem">${h[0]}</div><div class="tname">${p.kanji}　${h[1]}</div><div class="ttrivia">${h[2]}</div>`;treasureEl.classList.add('show');clearTimeout(trsT);trsT=setTimeout(()=>treasureEl.classList.remove('show'),2000);}
function showCombo(n){comboEl.textContent=`となりどうし！コンボ ×${n}`;comboEl.classList.remove('pop');void comboEl.offsetWidth;comboEl.classList.add('pop');}
let toastT=null;
function flashToast(msg,color){toastEl.textContent=msg;toastEl.style.background=color||'#1f2a3d';toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1000);}

/* ===== チーム（陣取り） ===== */
const TEAM_DEF=[{name:'あか',color:'#ef4444'},{name:'あお',color:'#2f6df0'},{name:'みどり',color:'#10b981'},{name:'きいろ',color:'#eab308'}];
function nextTurn(){state.turn=(state.turn+1)%state.teams.length;}

/* ===== HUD ===== */
function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function renderHUD(){
  if(state.mode==='solo'){
    const stageTxt=state.quest?`${state.questIdx+1} / ${REGION_ORDER.length}（${REGION_ORDER[state.questIdx]}）`:(state.region==='all'?'全国':state.region);
    hud.innerHTML=`
      <div class="hudrow"><span>🗾 地方</span><b>${stageTxt}</b></div>
      <div class="hudrow"><span>⏱ タイム</span><b id="hTime">${fmt(Math.floor((Date.now()-state.t0)/1000))}</b></div>
      <div class="hudrow"><span>✅ 正解</span><b>${state.placed} / ${state.total}</b></div>
      <div class="hudrow"><span>🔥 コンボ</span><b>${state.combo>1?'×'+state.combo:'―'}</b></div>
      <div class="hudrow"><span>💎 集めたお宝</span><b>${state.collected.size} / 47</b></div>
      <div class="bar"><i style="width:${state.total?state.placed/state.total*100:0}%"></i></div>`;
  }else{
    hud.innerHTML=`
      <div class="hudrow"><span>⏱ タイム</span><b id="hTime">${fmt(Math.floor((Date.now()-state.t0)/1000))}</b></div>
      <div class="hudrow"><span>✅ おいた</span><b>${state.placed} / ${state.total}</b></div>
      <div class="bar"><i style="width:${state.total?state.placed/state.total*100:0}%"></i></div>
      <div id="teams"></div>`;
    const box=hud.querySelector('#teams');
    state.teams.forEach((t,i)=>{const c=document.createElement('div');c.className='teamchip'+(i===state.turn?' turn':'');c.style.color=t.color;c.style.background=t.color+'22';c.style.borderColor=t.color;c.innerHTML=`${t.name}<br><b>${state.teamScores[i]}</b>`;box.appendChild(c);});
  }
}
function tick(){const e=document.getElementById('hTime');if(e)e.textContent=fmt(Math.floor((Date.now()-state.t0)/1000));}

/* ===== 出題 ===== */
function regionList(region){let l=PREFS.filter(p=>region==='all'?true:p.region===region);for(let i=l.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[l[i],l[j]]=[l[j],l[i]];}return l;}
function focusRegion(region){const wrap=board.querySelector('g.prefectures');if(region==='all'){board.classList.remove('regionfocus');board.querySelectorAll('g.prefecture').forEach(g=>g.classList.remove('active'));}else{board.classList.add('regionfocus');board.querySelectorAll('g.prefecture').forEach(g=>{const p=PREFS.find(x=>x.g===g);g.classList.toggle('active',p&&p.region===region);});}}
function resetBoard(){board.querySelectorAll('g.prefecture').forEach(g=>{g.classList.remove('done','hot');g.style.fill='';g.style.opacity='';});board.querySelectorAll('text.pref-label').forEach(t=>t.remove());}

/* ===== 開始 ===== */
function startRound(region){
  state.region=region; state.furi=document.getElementById('furiToggle').checked;
  state.queue=regionList(region); state.total=state.queue.length; state.placed=0; state.miss=0;
  state.combo=0; state.lastRomaji=null; state.turn=0; state.owner={};
  if(state.mode==='group'){const n=state.teamCount||2;state.teams=TEAM_DEF.slice(0,n);state.teamScores=new Array(n).fill(0);}else state.teams=[];
  resetBoard(); focusRegion(region); buildTray(); renderHUD();
  hideOverlays(); state.running=true; state.t0=Date.now(); clearInterval(state.timer); state.timer=setInterval(tick,500);
}
function startQuest(){state.quest=true;state.questIdx=0;startRound(REGION_ORDER[0]);}
function startFree(region){state.quest=false;startRound(region);}

function finish(){
  state.running=false; clearInterval(state.timer); sWin();
  const secs=Math.floor((Date.now()-state.t0)/1000);
  if(state.mode==='group'){showGroupResult();return;}
  if(state.quest && state.questIdx<REGION_ORDER.length-1){ showStageClear(secs); }
  else { showSoloResult(secs); }
}

/* ===== 結果オーバーレイ ===== */
function hideOverlays(){startOv.classList.add('hide');stageOv.classList.add('hide');resultOv.classList.add('hide');}
function showStageClear(secs){
  const region=REGION_ORDER[state.questIdx];
  const got=PREFS.filter(p=>p.region===region).map(p=>HOZAI[p.romaji]?HOZAI[p.romaji][0]:'').join(' ');
  document.getElementById('stTitle').textContent=`${region} せいは！ 🎉`;
  document.getElementById('stBody').innerHTML=`<p style="font-size:15px;">タイム <b>${fmt(secs)}</b>／ミス <b>${state.miss}</b></p><p style="font-size:22px;">${got}</p><p style="color:#6b7891;font-size:13px;">この地方のお宝をゲット！次の地方へ進もう。</p>`;
  document.getElementById('stNext').textContent=`▶ ${REGION_ORDER[state.questIdx+1]} へ`;
  stageOv.classList.remove('hide');
}
function showSoloResult(secs){
  let medal='🥉',title='クリア！';
  if(state.miss===0){medal='🥇';title='パーフェクト！';}else if(state.miss<=3){medal='🥈';title='すごい！';}
  const k='tdf_best_'+(state.quest?'quest':state.region); const cur=JSON.parse(localStorage.getItem(k)||'null');
  let nb=false; if(!cur||secs<cur){localStorage.setItem(k,secs);nb=true;}
  document.getElementById('rMedal').textContent= state.quest?'👑':medal;
  document.getElementById('rTitle').textContent= state.quest?'日本一周 せいは！👑':title;
  const acc=Math.round(state.placed/(state.placed+state.miss||1)*100);
  document.getElementById('rBody').innerHTML=`<p style="font-size:15px;">タイム <b>${fmt(secs)}</b>／ミス <b>${state.miss}</b>／正答率 <b>${acc}%</b>${nb?' <span style="color:#10b981;">✨自己ベスト！</span>':''}</p><p style="color:#6b7891;font-size:13px;">集めたお宝：${state.collected.size} / 47</p>`;
  resultOv.classList.remove('hide');
}
function showGroupResult(){
  const max=Math.max(...state.teamScores); const win=state.teams.filter((t,i)=>state.teamScores[i]===max);
  document.getElementById('rMedal').textContent='🏆';
  document.getElementById('rTitle').textContent= win.length===1?`${win[0].name}チームの勝ち！`:'引き分け！';
  document.getElementById('rBody').innerHTML='<p style="font-size:16px;">'+state.teams.map((t,i)=>`<span style="color:${t.color};font-weight:800;">${t.name} ${state.teamScores[i]}</span>`).join('　')+'</p><p style="color:#6b7891;font-size:13px;">自分の領地のとなりを取ると「れんさ」で+1点。</p>';
  resultOv.classList.remove('hide');
}

/* ===== メニュー（スタート画面）構築 ===== */
function buildMenu(){
  const best=JSON.parse(localStorage.getItem('tdf_best_quest')||'null');
  if(state.mode==='solo'){
    let g='<div class="medal">🧳</div><h2>個人モード：日本一周</h2>';
    g+='<p style="font-size:14px;color:#41506b;">県名の入ったピースを正しい場所へ。北海道→沖縄へ旅して、ご当地お宝を集めよう！</p>';
    g+=`<div class="pickrow"><button class="btn" id="qStart" style="font-size:16px;padding:11px 22px;">▶ 日本一周をはじめる</button></div>`;
    g+=`<p style="margin:12px 0 2px;font-size:12px;color:#6b7891;">${best!==null?'一周の自己ベスト：'+fmt(best):'まずは一周にチャレンジ！'}</p>`;
    g+='<div style="font-size:12px;color:#6b7891;margin-top:8px;">▼ 地方だけ練習する</div><div class="regiongrid" id="rgrid"></div>';
    startCard.innerHTML=g;
    const grid=startCard.querySelector('#rgrid');
    REGION_ORDER.forEach(r=>{const b=document.createElement('button');b.className='pick';b.textContent=r;b.onclick=()=>startFree(r);grid.appendChild(b);});
    startCard.querySelector('#qStart').onclick=startQuest;
  }else{
    let g='<div class="medal">⚔️</div><h2>グループモード：陣取りバトル</h2>';
    g+='<p style="font-size:14px;color:#41506b;">チームで交代しながら県を取り合おう。正解でその県が自分の色に！自分の領地のとなりを取ると「れんさ」でボーナス。</p>';
    g+='<div style="font-size:13px;color:#6b7891;margin-top:6px;">チーム数</div><div class="pickrow" id="tpick"></div>';
    g+='<div style="font-size:13px;color:#6b7891;margin-top:10px;">エリア</div><div class="regiongrid" id="rgrid2"></div>';
    g+='<div class="pickrow" style="margin-top:12px;"><button class="btn" id="gStart" style="font-size:16px;padding:11px 22px;">▶ バトル開始</button></div>';
    startCard.innerHTML=g;
    state.teamCount=state.teamCount||2; state.gRegion=state.gRegion||'all';
    const tp=startCard.querySelector('#tpick');
    [2,3,4].forEach(n=>{const b=document.createElement('button');b.className='pick'+(state.teamCount===n?' on':'');b.textContent=n+'チーム';b.onclick=()=>{state.teamCount=n;tp.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));b.classList.add('on');};tp.appendChild(b);});
    const rg=startCard.querySelector('#rgrid2');
    const allb=document.createElement('button');allb.className='pick'+(state.gRegion==='all'?' on':'');allb.textContent='全国';allb.onclick=()=>{state.gRegion='all';rg.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));allb.classList.add('on');};rg.appendChild(allb);
    REGION_ORDER.forEach(r=>{const b=document.createElement('button');b.className='pick'+(state.gRegion===r?' on':'');b.textContent=r;b.onclick=()=>{state.gRegion=r;rg.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));b.classList.add('on');};rg.appendChild(b);});
    startCard.querySelector('#gStart').onclick=()=>{state.quest=false;startRound(state.gRegion);};
  }
}
function showMenu(){state.running=false;clearInterval(state.timer);hideOverlays();buildMenu();startOv.classList.remove('hide');}

/* ===== モード切替・イベント ===== */
function setMode(m){state.mode=m;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));showMenu();}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
document.getElementById('homeBtn').onclick=showMenu;
document.getElementById('menuBtn').onclick=showMenu;
document.getElementById('againBtn').onclick=()=>{ if(state.mode==='group')startRound(state.gRegion); else if(state.quest)startQuest(); else startRound(state.region); };
document.getElementById('stNext').onclick=()=>{state.questIdx++;startRound(REGION_ORDER[state.questIdx]);};
document.getElementById('furiToggle').onchange=()=>{if(state.running)buildTray();};

/* 初期化 */
renderHUD(); setMode('solo');

/* PWA：Service Worker登録（オフライン対応） */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
</script>
</body>
